<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 320" role="img" aria-labelledby="title desc">
  <title id="title">三生万物 SANSHENG 标志</title>
  <desc id="desc">三个相互环抱、又向外生长的种子形态，共享一个发光的生命核心。</desc>
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6D68A"/>
      <stop offset="1" stop-color="#58D9B3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(160 160)">
    <circle r="119" fill="none" stroke="#173C35" stroke-width="2" stroke-dasharray="2 12" opacity="0.55"/>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 2 C-37 -20 -70 -65 -55 -104 C-43 -135 -7 -137 13 -111 C34 -84 25 -38 0 2Z"
            fill="#58D9B3" fill-opacity="0.14" stroke="#58D9B3" stroke-width="14"/>
      <path d="M0 2 C-37 -20 -70 -65 -55 -104 C-43 -135 -7 -137 13 -111 C34 -84 25 -38 0 2Z"
            transform="rotate(120)" fill="#7EC8FF" fill-opacity="0.14" stroke="#7EC8FF" stroke-width="14"/>
      <path d="M0 2 C-37 -20 -70 -65 -55 -104 C-43 -135 -7 -137 13 -111 C34 -84 25 -38 0 2Z"
            transform="rotate(240)" fill="#F2B86D" fill-opacity="0.14" stroke="#F2B86D" stroke-width="14"/>
    </g>
    <circle r="23" fill="url(#core)" filter="url(#glow)"/>
    <circle r="7" fill="#081914"/>
  </g>

  <g transform="translate(340 0)">
    <text x="0" y="143" fill="#0B2B24" font-family="Microsoft YaHei, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="74" font-weight="700" letter-spacing="8">三生万物</text>
    <text x="4" y="205" fill="#2C6559" font-family="Aptos, Inter, Arial, sans-serif" font-size="29" font-weight="600" letter-spacing="14">SANSHENG</text>
    <path d="M4 235 H708" stroke="#78B9A9" stroke-width="2"/>
    <text x="4" y="273" fill="#54736C" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" letter-spacing="4">一体三核 · 生生不息</text>
  </g>
</svg>
