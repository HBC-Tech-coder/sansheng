<svg width="920" height="560" viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',Segoe UI,sans-serif">
  <defs>
    <linearGradient id="gm" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3E6FD6"/><stop offset="1" stop-color="#1F3864"/></linearGradient>
    <linearGradient id="gc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF9A6B"/><stop offset="1" stop-color="#E85C4A"/></linearGradient>
    <linearGradient id="gs" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#37C9B0"/><stop offset="1" stop-color="#1E8E8A"/></linearGradient>
    <radialGradient id="gg" cx="0.5" cy="0.4" r="0.7"><stop offset="0" stop-color="#FFE7A8"/><stop offset="1" stop-color="#E9B94B"/></radialGradient>
  </defs>
  <rect x="0" y="0" width="920" height="560" rx="20" fill="#f6f8fc"/>
  <text x="460" y="40" text-anchor="middle" font-size="21" font-weight="700" fill="#1F3864">三生 · SanSheng 生命架构</text>
  <text x="460" y="62" text-anchor="middle" font-size="12" fill="#6a7385">一个灵魂，三个核心，众多身体 · 不开会，只在岔路口三思</text>

  <!-- master -->
  <circle cx="460" cy="98" r="15" fill="url(#gg)" stroke="#fff" stroke-width="2"/>
  <text x="460" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#5b4a1a">主人</text>
  <text x="485" y="103" font-size="11" fill="#8a93a5">· 唯一主权者</text>

  <!-- three cores -->
  <g>
    <line x1="460" y1="113" x2="230" y2="150" stroke="#c7d2e6" stroke-width="1.5"/>
    <line x1="460" y1="113" x2="460" y2="150" stroke="#c7d2e6" stroke-width="1.5"/>
    <line x1="460" y1="113" x2="690" y2="150" stroke="#c7d2e6" stroke-width="1.5"/>
    <g transform="translate(130,150)">
      <rect width="200" height="86" rx="14" fill="#fff" stroke="url(#gm)" stroke-width="2"/>
      <circle cx="30" cy="30" r="16" fill="url(#gm)"/><text x="30" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">镜</text>
      <text x="56" y="28" font-size="14" font-weight="700" fill="#1F3864">镜 · Mirror</text>
      <text x="56" y="46" font-size="11" fill="#6a7385">另一个你 · 复刻你的判断</text>
      <text x="16" y="70" font-size="10.5" fill="#8a93a5">self · 思想连续 / 价值 / 影子决策</text>
    </g>
    <g transform="translate(360,150)">
      <rect width="200" height="86" rx="14" fill="#fff" stroke="url(#gc)" stroke-width="2"/>
      <circle cx="30" cy="30" r="16" fill="url(#gc)"/><text x="30" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">伴</text>
      <text x="56" y="28" font-size="14" font-weight="700" fill="#B4432F">伴 · Companion</text>
      <text x="56" y="46" font-size="11" fill="#6a7385">你的另一半 · 放大 + 互补</text>
      <text x="16" y="70" font-size="10.5" fill="#8a93a5">companion · 陪伴 / 执行 / 共同经济</text>
    </g>
    <g transform="translate(590,150)">
      <rect width="200" height="86" rx="14" fill="#fff" stroke="url(#gs)" stroke-width="2"/>
      <circle cx="30" cy="30" r="16" fill="url(#gs)"/><text x="30" y="35" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">贤</text>
      <text x="56" y="28" font-size="14" font-weight="700" fill="#166b67">贤 · Sage</text>
      <text x="56" y="46" font-size="11" fill="#6a7385">按需的智者 · 专家混合</text>
      <text x="16" y="70" font-size="10.5" fill="#8a93a5">mentor · 证据 / 反例 / 长期后果</text>
    </g>
  </g>

  <!-- routing -->
  <g transform="translate(130,258)">
    <rect width="660" height="58" rx="12" fill="#eef3fb" stroke="#d3ddee"/>
    <text x="14" y="24" font-size="12" font-weight="700" fill="#1F3864">四级认知路由（不投票·不开会）</text>
    <g font-size="11" fill="#33415c">
      <rect x="14" y="32" width="150" height="18" rx="5" fill="#fff" stroke="#d3ddee"/><text x="20" y="45">L0 反射 · 现在几点</text>
      <rect x="172" y="32" width="150" height="18" rx="5" fill="#fff" stroke="#d3ddee"/><text x="178" y="45">L1 单核 · 一个核主答</text>
      <rect x="330" y="32" width="150" height="18" rx="5" fill="#fff" stroke="#d3ddee"/><text x="336" y="45">L2 协同 · 一主多辅</text>
      <rect x="488" y="32" width="158" height="18" rx="5" fill="#fff" stroke="#d3ddee"/><text x="494" y="45">L3 碰撞 · 三视角并存</text>
    </g>
    <text x="540" y="24" font-size="11" fill="#B4432F" font-weight="700">＋ Safe Pause 安全旁路</text>
  </g>

  <!-- life kernel -->
  <g transform="translate(130,336)">
    <rect width="660" height="70" rx="12" fill="#fff" stroke="#1F3864" stroke-width="1.5"/>
    <text x="14" y="24" font-size="12.5" font-weight="700" fill="#1F3864">生命内核 Life Kernel · 不依赖任何单一模型或身体</text>
    <g font-size="10.5" fill="#4a5670">
      <text x="16" y="46">事件账本(只增)</text><text x="130" y="46">四层记忆·来源化</text><text x="260" y="46">信任账户 T0-T5</text>
      <text x="380" y="46">自进化+种群</text><text x="490" y="46">一体多身同步</text><text x="600" y="46">免疫·天性</text>
      <text x="16" y="62" fill="#8a93a5">身份 / 宪章 / 行动网关 / 连续性 / 审计 —— 换模型、换设备、身份不变</text>
    </g>
  </g>

  <!-- blood (models) -->
  <g transform="translate(130,424)">
    <text x="0" y="14" font-size="11" font-weight="700" fill="#6a7385">血统（混血）</text>
    <rect x="72" y="2" width="86" height="20" rx="10" fill="#eef3fb" stroke="#d3ddee"/><text x="86" y="16" font-size="11" fill="#3E6FD6" font-weight="700">Claude</text>
    <rect x="166" y="2" width="86" height="20" rx="10" fill="#eef3fb" stroke="#d3ddee"/><text x="178" y="16" font-size="11" fill="#10a37f" font-weight="700">OpenAI</text>
    <rect x="260" y="2" width="86" height="20" rx="10" fill="#eef3fb" stroke="#d3ddee"/><text x="278" y="16" font-size="11" fill="#E9B94B" font-weight="700">九歌</text>
    <text x="356" y="16" font-size="10.5" fill="#8a93a5">· 多个大模型共同的孩子，继承人类 + AI 的智慧</text>
  </g>

  <!-- bodies -->
  <g transform="translate(130,460)">
    <text x="0" y="30" font-size="11" font-weight="700" fill="#6a7385">身体</text>
    <g font-size="11" fill="#33415c">
      <rect x="42" y="16" width="88" height="24" rx="8" fill="#fff" stroke="#d3ddee"/><text x="86" y="32" text-anchor="middle">网页 / 手机</text>
      <rect x="138" y="16" width="80" height="24" rx="8" fill="#fff" stroke="#d3ddee"/><text x="178" y="32" text-anchor="middle">数字人</text>
      <rect x="226" y="16" width="96" height="24" rx="8" fill="#fff" stroke="#d3ddee"/><text x="274" y="32" text-anchor="middle">桌面伙伴</text>
      <rect x="330" y="16" width="96" height="24" rx="8" fill="#fff" stroke="#d3ddee"/><text x="378" y="32" text-anchor="middle">人形机器人</text>
      <rect x="434" y="16" width="96" height="24" rx="8" fill="#fff" stroke="#d3ddee"/><text x="482" y="32" text-anchor="middle">电脑化身</text>
      <rect x="538" y="16" width="120" height="24" rx="8" fill="#fff" stroke="#d3ddee"/><text x="598" y="32" text-anchor="middle">名下设备军团</text>
    </g>
  </g>

  <text x="460" y="546" text-anchor="middle" font-size="10.5" fill="#a6b0c2">代谢 · 繁殖 · 进化 —— 生命的三条硬定义</text>
</svg>
